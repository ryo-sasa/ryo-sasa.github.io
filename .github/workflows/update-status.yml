name: Update transit status

# JR 越後線・新潟交通の運行情報を定期取得し data/status.json を更新する。
# username.github.io リポジトリは main への push で Pages が自動再デプロイされる。

on:
  schedule:
    # 15分ごと（UTC基準・GitHub混雑時は数分前後する）
    - cron: "*/15 * * * *"
  workflow_dispatch: {} # 手動実行も可能
  push:
    branches: [main]
    paths:
      - "scripts/fetch_status.py"
      - ".github/workflows/update-status.yml"

permissions:
  contents: write

concurrency:
  group: update-transit-status
  cancel-in-progress: false

jobs:
  update:
    # データ源を Yahoo!路線情報（非Akamai・クラウドから到達可）にしたため、
    # GitHub ホストランナーで 24 時間動かせる（Mac 不要）。
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch transit status
        run: python scripts/fetch_status.py

      - name: Commit updated status
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 生成した status.json を一時退避（毎回まるごと再生成されるファイル）
          cp data/status.json /tmp/status.json
          # 競合（他の push が先に入った場合）に備えて最大5回リトライする。
          # 毎回 origin/main の最新へ reset し直してから status.json を上書きするため、
          # マージ競合は発生しない。
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/status.json data/status.json
            git add data/status.json
            if git diff --staged --quiet; then
              echo "変更なし: コミットをスキップします。"
              exit 0
            fi
            git commit -m "chore: update transit status [skip ci]"
            if git push origin HEAD:main; then
              echo "push 成功 (試行 ${i} 回目)"
              exit 0
            fi
            echo "push 失敗。remote の変更を取り込んで再試行します (試行 ${i} 回目)"
            sleep 3
          done
          echo "::error::5回試行しても push に失敗しました。"
          exit 1
