name: Update transit status

# JR 越後線・新潟交通の運行情報を定期取得し data/status.json を更新する。
# username.github.io リポジトリは main への push で Pages が自動再デプロイされる。

on:
  schedule:
    # 15分ごと（UTC基準・GitHub混雑時は数分前後する）
    - cron: "*/15 * * * *"
  workflow_dispatch: {}     # 手動実行も可能
  push:
    branches: [main]
    paths:
      - "scripts/fetch_status.py"
      - ".github/workflows/update-status.yml"

permissions:
  contents: write

concurrency:
  group: update-transit-status
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch transit status
        run: python scripts/fetch_status.py

      - name: Commit updated status
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/status.json
          if git diff --staged --quiet; then
            echo "変更なし: コミットをスキップします。"
          else
            git commit -m "chore: update transit status [skip ci]"
            git push
          fi
